<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button class="theme-toggle" id="theme-toggle">🌙</button>
        <h1>Lotto Number Generator</h1>
        <div class="lotto-display"></div>
        <button id="generate-btn">Generate Numbers</button>

        <div class="divider"></div>

        <section class="inquiry-section">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/mdaljnar" method="POST" id="inquiry-form">
                <div class="form-group">
                    <input type="email" name="email" placeholder="Your Email Address" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="How can we help you?" required></textarea>
                </div>
                <button type="submit" id="submit-btn">Send Inquiry</button>
            </form>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
