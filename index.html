    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/3V6EIIr9RM/";

        let model, labelContainer, maxPredictions;

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();
            
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                const barContainer = document.createElement("div");
                barContainer.className = "bar-container";
                
                const labelName = document.createElement("div");
                labelName.className = "label-name";
                
                const progressBg = document.createElement("div");
                progressBg.className = "progress-bg";
                
                const progressBar = document.createElement("div");
                progressBar.className = "progress-bar";
                
                const labelPercent = document.createElement("div");
                labelPercent.className = "label-percent";
                
                progressBg.appendChild(progressBar);
                barContainer.appendChild(labelName);
                barContainer.appendChild(progressBg);
                barContainer.appendChild(labelPercent);
                
                labelContainer.appendChild(barContainer);
            }
        }

        async function handleImageUpload(event) {
            if (!model) await init();
            
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                const img = document.getElementById("face-image");
                img.src = e.target.result;
                img.style.display = "block";
                await predict();
            };
            reader.readAsDataURL(file);
        }

        async function predict() {
            const img = document.getElementById("face-image");
            const prediction = await model.predict(img);
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction = prediction[i].className;
                const probability = (prediction[i].probability * 100).toFixed(0) + "%";
                
                const barContainer = labelContainer.childNodes[i];
                barContainer.querySelector(".label-name").innerHTML = classPrediction;
                barContainer.querySelector(".progress-bar").style.width = probability;
                barContainer.querySelector(".label-percent").innerHTML = probability;
            }
        }

        // Initialize model on load
        init();
    </script>
    <script src="main.js"></script>
