<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button class="theme-toggle" id="theme-toggle">🌙</button>
        <h1>Animal Face Test</h1>
        <p class="subtitle">AI-powered Dog or Cat face classifier</p>
        
        <div class="test-area">
            <button type="button" id="start-btn" onclick="init()">Start Test</button>
            <div id="webcam-container"></div>
            <div id="label-container"></div>
        </div>

        <div class="divider"></div>

        <section class="inquiry-section">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/mdaljnar" method="POST" id="inquiry-form">
                <div class="form-group">
                    <input type="email" name="email" placeholder="Your Email Address" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="How can we help you?" required></textarea>
                </div>
                <button type="submit" id="submit-btn">Send Inquiry</button>
            </form>
        </section>

        <div class="divider"></div>

        <section class="comment-section">
            <h2>Comments</h2>
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                /*
                var disqus_config = function () {
                this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
                this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                */
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://mactest260227.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        // More API functions here:
        // https://github.com/googlecreativelab/teachablemachine-community/tree/master/libraries/image

        // the link to your model provided by Teachable Machine export panel
        const URL = "https://teachablemachine.withgoogle.com/models/3V6EIIr9RM/";

        let model, webcam, labelContainer, maxPredictions;

        // Load the image model and setup the webcam
        async function init() {
            const startBtn = document.getElementById("start-btn");
            startBtn.innerHTML = "Loading...";
            startBtn.disabled = true;

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // load the model and metadata
            // Refer to tmImage.loadFromFiles() in the API to support files from a file picker
            // or files from your local hard drive
            // Note: the pose library adds "tmImage" object to your window (window.tmImage)
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // Convenience function to setup a webcam
            const flip = true; // whether to flip the webcam
            webcam = new tmImage.Webcam(300, 300, flip); // width, height, flip
            await webcam.setup(); // request access to the webcam
            await webcam.play();
            window.requestAnimationFrame(loop);

            // append elements to the DOM
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; // Clear initial
            for (let i = 0; i < maxPredictions; i++) { // and class labels
                const barContainer = document.createElement("div");
                barContainer.className = "bar-container";
                
                const labelName = document.createElement("div");
                labelName.className = "label-name";
                
                const progressBg = document.createElement("div");
                progressBg.className = "progress-bg";
                
                const progressBar = document.createElement("div");
                progressBar.className = "progress-bar";
                
                const labelPercent = document.createElement("div");
                labelPercent.className = "label-percent";
                
                progressBg.appendChild(progressBar);
                barContainer.appendChild(labelName);
                barContainer.appendChild(progressBg);
                barContainer.appendChild(labelPercent);
                
                labelContainer.appendChild(barContainer);
            }
            startBtn.style.display = "none";
        }

        async function loop() {
            webcam.update(); // update the webcam frame
            await predict();
            window.requestAnimationFrame(loop);
        }

        // run the webcam image through the image model
        async function predict() {
            // predict can take in an image, video or canvas html element
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction = prediction[i].className;
                const probability = (prediction[i].probability * 100).toFixed(0) + "%";
                
                const barContainer = labelContainer.childNodes[i];
                barContainer.querySelector(".label-name").innerHTML = classPrediction;
                barContainer.querySelector(".progress-bar").style.width = probability;
                barContainer.querySelector(".label-percent").innerHTML = probability;
            }
        }
    </script>
    <script src="main.js"></script>
</body>
</html>
